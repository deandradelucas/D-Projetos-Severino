<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Horizonte Financeiro</title>
  <link rel="icon" type="image/svg+xml" href="/images/horizonte_fiel_original_icon_light.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/global.css">
  <link rel="stylesheet" href="/src/styles/login.css">
</head>
<body>
  <div class="background-wrapper" id="background"></div>
  
  <div class="login-container">
    <div class="login-card">
      <div class="logo-wrapper">
        <img src="/images/horizonte_fiel_original_logo_light.svg" alt="Horizonte Financeiro" class="logo">
      </div>

      <h1>Entrar</h1>
      <p class="subtitle">Faça login para continuar</p>

      <form id="loginForm" class="form-fields">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <div class="input-with-icon">
            <input type="password" id="senha" name="senha" placeholder="Sua senha" required autocomplete="current-password">
            <button type="button" class="toggle-password" id="toggleSenha">
              <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.46.46L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
              </svg>
              <svg class="eye-off-icon hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
              </svg>
            </button>
          </div>
          <div class="forgot-password-row">
            <label class="remember-email-label">
              <input type="checkbox" id="rememberEmail">
              <span>Lembrar e-mail</span>
            </label>
            <a href="#" class="forgot-password-link">Esqueceu a senha?</a>
          </div>
        </div>

        <button type="submit" class="btn-entrar">Entrar</button>
      </form>

      <div class="mensagem" id="mensagem"></div>

      <p class="signup-link">
        Não tem conta? <a href="/cadastro">Criar conta</a>
      </p>

      <div class="security-badge">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path fill-rule="evenodd" d="M12 1.5a5.25 5.25 0 00-5.25 5.25v3a3 3 0 00-3 3v6.75a3 3 0 003 3h10.5a3 3 0 003-3v-6.75a3 3 0 00-3-3v-3c0-2.9-2.35-5.25-5.25-5.25zm3.75 8.25v-3a3.75 3.75 0 10-7.5 0v3h7.5z" clip-rule="evenodd" />
        </svg>
        <span>Seus dados estão seguros</span>
      </div>
    </div>
  </div>

  <script src="/src/scripts/background.js"></script>
  <script src="/src/scripts/login.js" type="module"></script>
</body>
</html>
