<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/pwa-app-icon.png" />
    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/pwa-app-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent: o webview ocupa a região da status bar, tornando
         env(safe-area-inset-top) > 0 — o conteúdo reserva esse topo via
         .app-routes-grow e a StatusBarScrim pinta a faixa por tema (no modo
         'default' o iOS pintava a faixa pelo fundo do body, cacheado no launch). -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Severino" />
    <title>Severino — Finanças e agenda</title>
    <!-- Fontes self-hosted via @fontsource — importadas em src/main.jsx -->
  </head>
  <body>
    <script>
      try {
        var k = 'horizonte_theme'
        var v = localStorage.getItem(k)
        if (v === 'dark' || v === 'light') document.body.setAttribute('data-theme', v)
        else document.body.setAttribute('data-theme', 'light')
      } catch (e) {
        document.body.setAttribute('data-theme', 'light')
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
