services:
  evolution-api:
    image: atendai/evolution-api:v2.2.0
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "${EVOLUTION_PORT:-8080}:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=${EVOLUTION_SERVER_URL:-http://localhost:8080}
      - DOCKER_ENV=true
      - DEL_INSTANCE=false
      - LOG_LEVEL=${EVOLUTION_LOG_LEVEL:-ERROR,WARN,INFO,WEBHOOKS}
      - LOG_COLOR=true
      - LOG_BAILEYS=error
      - CONFIG_SESSION_PHONE_CLIENT=${EVOLUTION_SESSION_PHONE_CLIENT:-Horizonte Financeiro}
      - CONFIG_SESSION_PHONE_NAME=${EVOLUTION_SESSION_PHONE_NAME:-Chrome}
      - CONFIG_SESSION_PHONE_VERSION=${EVOLUTION_SESSION_PHONE_VERSION:-2.3000.1035194821}
      - QRCODE_LIMIT=${EVOLUTION_QRCODE_LIMIT:-60}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-change-me-local-evolution-key}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:${EVOLUTION_POSTGRES_PASSWORD:-evol_secret}@evolution-db:5432/${EVOLUTION_POSTGRES_DB:-evolution}?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=${EVOLUTION_DATABASE_CLIENT_NAME:-horizonte_evolution}
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false
      - DATABASE_SAVE_DATA_LABELS=false
      - DATABASE_SAVE_DATA_HISTORIC=false
      - CACHE_REDIS_ENABLED=false
      - CACHE_REDIS_URI=redis://evolution-redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=${EVOLUTION_REDIS_PREFIX:-horizonte_evolution}
      - CACHE_REDIS_SAVE_INSTANCES=false
      - CACHE_LOCAL_ENABLED=true
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=${WHATSAPP_WEBHOOK_BASE_URL:-http://host.docker.internal:3001}/api/whatsapp/webhook/${WHATSAPP_WEBHOOK_TOKEN:-ece58f64012d51028d28a04264d07131}
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=true
      - WEBHOOK_EVENTS_MESSAGES_DELETE=true
      - WEBHOOK_EVENTS_SEND_MESSAGE=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - WEBHOOK_EVENTS_ERRORS=true
      - CORS_ORIGIN=${EVOLUTION_CORS_ORIGIN:-*}
      - CORS_METHODS=GET,POST,PUT,DELETE
      - CORS_CREDENTIALS=true
      - RABBITMQ_ENABLED=false
      - SQS_ENABLED=false
      - WEBSOCKET_ENABLED=false
      - CHATWOOT_ENABLED=false
      - TYPEBOT_ENABLED=false
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    depends_on:
      evolution-db:
        condition: service_healthy
      evolution-redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  evolution-db:
    image: postgres:15-alpine
    container_name: evolution-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${EVOLUTION_POSTGRES_PASSWORD:-evol_secret}
      - POSTGRES_DB=${EVOLUTION_POSTGRES_DB:-evolution}
    volumes:
      - evolution_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ${EVOLUTION_POSTGRES_DB:-evolution}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  evolution-redis:
    image: redis:7-alpine
    container_name: evolution-redis
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - evolution_redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  evolution_instances:
  evolution_store:
  evolution_db_data:
  evolution_redis_data:
